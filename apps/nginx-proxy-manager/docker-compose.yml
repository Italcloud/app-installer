services:
  npm:
    image: jc21/nginx-proxy-manager:${APP_TAG}
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "${EXPOSE_PORT:-80}:80"
      - "${EXPOSE_PORT_HTTPS:-443}:443"
      - "81:81"
    volumes:
      - ${INSTALL_DIR}/data/config:/data
      - ${INSTALL_DIR}/data/storage:/etc/letsencrypt
    environment:
      - DB_SQLITE_FILE=/data/database.sqlite
      - INITIAL_ADMIN_EMAIL=${ADMIN_EMAIL}
      - INITIAL_ADMIN_PASSWORD=${ADMIN_PASSWORD}
