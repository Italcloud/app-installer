services:
    zoraxy:
        image: zoraxydocker/zoraxy:${APP_TAG}
        container_name: zoraxy
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
            - "${MANAGEMENT_PORT:-8000}:8000"
        volumes:
            - ${INSTALL_DIR}/data/config/:/opt/zoraxy/config/
            - ${INSTALL_DIR}/data/plugin/:/opt/zoraxy/plugin/
            - /var/run/docker.sock:/var/run/docker.sock
        extra_hosts:
            - "host.docker.internal:host-gateway"
        environment:
            FASTGEOIP: "true"
            TZ: "Europe/Rome"
