services:
  omada-controller:
    image: mbentley/omada-controller:${APP_TAG}
    container_name: omada-controller
    restart: unless-stopped
    network_mode: host
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    stop_grace_period: 60s
    environment:
      - PUID=508
      - PGID=508
      - MANAGE_HTTP_PORT=${EXPOSE_PORT:-8088}
      - MANAGE_HTTPS_PORT=8043
      - PORTAL_HTTP_PORT=8088
      - PORTAL_HTTPS_PORT=8843
      - SHOW_SERVER_LOGS=true
      - SHOW_MONGODB_LOGS=false
      - SSL_CERT_NAME=tls.crt
      - SSL_KEY_NAME=tls.key
      - TZ=Europe/Rome
    volumes:
      - ${INSTALL_DIR}/data/config:/opt/tplink/EAPController/data
      - ${INSTALL_DIR}/data/logs:/opt/tplink/EAPController/logs
      - ${INSTALL_DIR}/data/storage:/opt/tplink/EAPController/work
      - /etc/localtime:/etc/localtime:ro
