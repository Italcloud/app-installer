services:
  outline:
    image: outlinewiki/outline:${APP_TAG}
    container_name: outline
    restart: unless-stopped
    ports:
      - "${EXPOSE_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - UTILS_SECRET=${UTILS_SECRET}
      - DATABASE_URL=postgres://outline:${PG_PASSWORD}@postgres:5432/outline
      - REDIS_URL=redis://redis:6379
      - URL=${URL}
      - PORT=3000
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID:-}
      - SLACK_CLIENT_SECRET=${SLACK_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID:-}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET:-}
    volumes:
      - ${INSTALL_DIR}/data/storage:/var/lib/outline/data

  postgres:
    image: postgres:16.3-alpine
    container_name: outline-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=outline
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_DB=outline
    volumes:
      - ${INSTALL_DIR}/data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outline"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: outline-redis
    restart: unless-stopped
    volumes:
      - ${INSTALL_DIR}/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
