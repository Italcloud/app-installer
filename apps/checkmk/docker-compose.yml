services:
    checkmk:
        image: checkmk/check-mk-raw:${APP_TAG}
        container_name: checkmk
        restart: unless-stopped
        ports:
            - "${EXPOSE_PORT:-8080}:5000"
            - "8000:8000"
        volumes:
            - ${INSTALL_DIR}/data:/omd/sites
            - /etc/localtime:/etc/localtime:ro
        environment:
            - TZ=Europe/Rome
            - CMK_PASSWORD=${ADMIN_PASSWORD}
        tmpfs:
            - /opt/omd/sites/cmk/tmp:uid=1000,gid=1000
        ulimits:
            nofile: 1024
