services:
  checkmk:
    image: checkmk/check-mk-raw:${APP_TAG}
    container_name: checkmk
    restart: unless-stopped
    ports:
      - "${EXPOSE_PORT:-5000}:5000"
      - "8000:8000"
    volumes:
      - ${INSTALL_DIR}/data/config:/omd/sites
      - /etc/localtime:/etc/localtime:ro
    environment:
      - CMK_SITE_ID=${SITE_NAME}
      - CMK_PASSWORD=${ADMIN_PASSWORD}
    tmpfs:
      - /opt/omd/sites/${SITE_NAME}/tmp:uid=1000,gid=1000
